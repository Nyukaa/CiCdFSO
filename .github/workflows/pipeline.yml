name: Deployment pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize]

jobs:
  simple_deployment_pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run ESLint
        run: npm run eslint

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Trigger Render deployment
        id: deploy
        if: |
          github.event_name == 'push' &&
          !contains(join(github.event.commits.*.message, ' '), '#skip')
        run: curl ${{ secrets.RENDER_DEPLOY_HOOK }}

      - name: Notify Discord on failure
        if: failure()
        uses: Ilshidur/action-discord@0.3.2
        with:
          args: >
            ❌ Build failed! The pipeline encountered an error
            Failure details
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
            Workflow: ${{ github.workflow }}
            Job: simple_deployment_pipeline
            View Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
            View Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}

      - name: Notify Discord on success
        if: success() && steps.deploy.conclusion == 'success'
        uses: Ilshidur/action-discord@0.3.2
        with:
          args: >
            ✅ Deployment successful! A new version deployed to production
            Deployment details: https://github.com/${{ github.repository }}
            Commit: ${{ github.sha }}
            Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
  tag_release:
    needs: [simple_deployment_pipeline]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Bump version and push tag
        if: |
          github.event_name == 'push' &&
          !contains(join(github.event.commits.*.message, ' '), '#skip')
        uses: anothrNick/github-tag-action@4ed44965e0db8dab2b466a16da04aec3cc312fd8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
